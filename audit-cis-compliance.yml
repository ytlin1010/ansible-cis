---
- name: Ubuntu CIS 官方安全合規自動化稽核 (Audit)
  hosts: all
  become: true

  vars:
    # 報告要集中打包送回 Semaphore 宿主機的暫存路徑
    semaphore_web_dir: "/var/www/html/usg-reports"

  tasks:
    - name: 執行 CIS Level 1 系統安全合規稽核
      command: usg audit cis_level1_server
      register: usg_audit_result
      # usg audit 只要系統有不合規就會回傳非 0 狀態碼，為了不讓劇本中斷，必須加上這行
      failed_when: false
      become: true
      become_method: sudo
      become_user: root

    - name: 找出剛剛生成的最新 HTML 稽核報告檔名
      shell: find /var/lib/usg/ -name "*.html" -type f -printf "%T@ %p\n" | sort -n | cut -d' ' -f2- | tail -n 1
      register: latest_html_report
      changed_when: false
      become: true
      become_method: sudo
      become_user: root

    - name: 確保 Semaphore 宿主機的報告目錄存在
      file:
        path: "{{ semaphore_web_dir }}"
        state: directory
        mode: '0755'
      connection: local  # 🟢 這裡要留著！因為開目錄是 Semaphore 容器本機的事
      become: false

    - name: 將目標機器的 HTML 稽核報告下載回 Semaphore 伺服器
      fetch:
        src: "{{ latest_html_report.stdout }}"
        dest: "{{ semaphore_web_dir }}/index.html"
        flat: yes
      # 🟢 核心修正：拿掉 connection: local！讓它走 SSH 去遠端 .148 抓檔案
      # 🟢 核心修正：加上 become: true，這樣才能讀取 .148 機器上屬於 root 的 usg 報告
      become: true
      become_method: sudo
      become_user: root
