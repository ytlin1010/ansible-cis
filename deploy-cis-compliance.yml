---
- name: Ubuntu CIS 官方 USG 打底與 Auditd 精細化合規優化
  hosts: all
  become: true

  vars:
    # [組態變數] 請根據企業內控標準調整下方數值 (Ubuntu Pro Token 已移至 Semaphore 保護)
    ubuntu_pro_token: "{{ lookup('ansible.builtin.env', 'ubuntu_pro_token') }}"
    audit_max_log_file: 30                  # 單個 audit 日誌最大容量 (MB)
    audit_num_logs: 5                       # 保留日誌檔案數量
    audit_max_log_file_action: "ROTATE"     # 額滿時的處理機制 (ROTATE/SUSPEND/KEEP_LOGS)
    semaphore_web_dir: "/var/www/html/usg-reports" # 報告集中放置路徑 (Semaphore 伺服器端)

  tasks:
    - name: 檢查系統是否已啟用 Ubuntu Pro 訂閱
      command: pro status
      register: pro_status_check
      changed_when: false
      failed_when: false
      
    - name: 執行 Ubuntu Pro 金鑰附加 (若未附加)
      command: pro attach "{{ ubuntu_pro_token }}"
      register: pro_attach_result
      # === 核心修正：強制在此任務使用最嚴格的 root 身份與 shell 載入 ===
      become: true
      become_method: sudo
      become_user: root
      # =========================================================
      when: "'status: unattached' in pro_status_check.stdout or 'This machine is not attached' in pro_status_check.stdout"
      failed_when: 
        - pro_attach_result.rc != 0
        - "'already attached' not in pro_attach_result.stderr"

    - name: 確保已啟用 Ubuntu Security Guide (USG) 工具
      command: pro enable usg --beta
      register: usg_enable_result
      # === 權限強制對齊：全面套用與 pro attach 相同的 root 提權 ===
      become: true
      become_method: sudo
      become_user: root
      changed_when: "'enabling' in usg_enable_result.stdout"
      failed_when:
        - usg_enable_result.rc != 0
        - "'already enabled' not in usg_enable_result.stderr"

    - name: 更新 apt 套件快取快照
      apt:
        update_cache: yes
        cache_valid_time: 3600

    - name: 安裝 USG 官方合規套件
      apt:
        name: usg
        state: present

    - name: 執行 CIS Level 1 系統自動化合規修正 (Fix)
      command: usg fix cis_level1_server
      register: usg_fix_result
      # === 權限強制對齊：修復時也必須以完整的 root 權限去改動系統設定 ===
      become: true
      become_method: sudo
      become_user: root
      ignore_errors: yes

    # ================= 🟢 核心修正：強制補上 auditd 安裝 =================
    - name: 確保系統已安裝 auditd 審計守護程序套件
      apt:
        name: auditd
        state: present
    # ===================================================================

    - name: 優化 /etc/audit/auditd.conf 精細化日誌配置
      lineinfile:
        path: /etc/audit/auditd.conf
        regexp: "^{{ item.key }} ="
        line: "{{ item.key }} = {{ item.value }}"
        state: present
        # === 🟢 核心修正：強制為此任務指名最嚴格的 root 權限 ===
      become: true
      become_method: sudo
      become_user: root
      loop:
        - { key: 'max_log_file', value: "{{ audit_max_log_file }}" }
        - { key: 'num_logs', value: "{{ audit_num_logs }}" }
        - { key: 'max_log_file_action', value: "{{ audit_max_log_file_action }}" }
      notify: 重啟 auditd 服務

  handlers:
    - name: 重啟 auditd 服務
      command: service auditd restart
      become: true
      become_method: sudo
      become_user: root
      ignore_errors: yes
